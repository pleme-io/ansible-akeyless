name: Bug report
description: A module misbehaves, a generator output is wrong, or a test fails.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in as much as you can — reproducers shorten triage by hours.

  - type: input
    id: module
    attributes:
      label: Affected module
      description: e.g. `akeyless.akeyless.role` or `akeyless.akeyless.uid_generate_token`
      placeholder: akeyless.akeyless.<module_name>
    validations:
      required: true

  - type: input
    id: collection_version
    attributes:
      label: Collection version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: ansible_version
    attributes:
      label: Ansible version
      description: Output of `ansible --version`
      placeholder: "ansible-core 2.16.x"
    validations:
      required: true

  - type: input
    id: akeyless_sdk_version
    attributes:
      label: Akeyless SDK version
      description: Output of `pip show akeyless | head -2`
      placeholder: "5.0.22"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error message + relevant ansible output if applicable.
      render: shell
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer playbook
      description: Smallest playbook that triggers the issue. Redact any access keys.
      render: yaml
    validations:
      required: true

  - type: checkboxes
    id: not_secret
    attributes:
      label: Pre-submission checks
      options:
        - label: I have not included any access keys, tokens, or other secrets in the report.
          required: true
        - label: I checked existing issues and didn't find a duplicate.
          required: true
