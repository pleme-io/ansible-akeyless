name: ci
on: [push, pull_request]
jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install ansible pytest
      - name: Run AST smoke test
        run: python3 tests/sanity/smoke.py
      - name: Run pytest unit tests
        run: pytest tests/unit/ -v
      # Optional: ansible-test sanity once the collection is in the
      # proper ansible_collections/akeyless/akeyless/ path layout.
