name: ci

on: [push, pull_request]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install ansible pytest jsonschema pyyaml
      - name: Run AST smoke test
        run: python3 tests/sanity/smoke.py
      - name: Run pytest unit tests
        run: pytest tests/unit/ -v

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install pytest jsonschema pyyaml
      - name: Fetch upstream OpenAPI spec
        run: |
          mkdir -p tests/openapi
          curl -fsSL \
            https://raw.githubusercontent.com/akeylesslabs/akeyless-go/main/api/openapi.yaml \
            -o tests/openapi/openapi.yaml
          echo "AKEYLESS_OPENAPI_YAML=$(pwd)/tests/openapi/openapi.yaml" >> "$GITHUB_ENV"
      - name: Run OpenAPI coverage matrix
        run: pytest tests/openapi/ -v
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-coverage
          path: tests/openapi/COVERAGE.md
