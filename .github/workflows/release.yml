name: release

# Triggered by:
#   - A pushed annotated tag of the form `vX.Y.Z`
#   - Manual workflow_dispatch (specify version in the input)
#
# Pipeline:
#   1. Check out the tagged commit (or the branch for dispatch).
#   2. Install ansible-core + akeyless SDK + test deps.
#   3. Run the same gate suite CI runs: sanity smoke + unit + OpenAPI matrix.
#   4. Resolve the version from the tag (or input).
#   5. Build the Galaxy tarball via scripts/release.sh.
#   6. If the ANSIBLE_GALAXY_API_KEY repo secret is set, publish to
#      galaxy.ansible.com. If not, this step is a no-op -- the tarball
#      still gets attached to the GitHub Release.
#   7. Cut a GitHub Release with the tarball + sha256 attached.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0)'
        required: true
        type: string

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build_and_publish:
    name: build + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install 'ansible-core>=2.14' pytest jsonschema pyyaml 'akeyless>=5.0.22'

      - name: Fetch upstream OpenAPI spec
        run: |
          mkdir -p tests/openapi
          curl -fsSL \
            https://raw.githubusercontent.com/akeylesslabs/akeyless-go/main/api/openapi.yaml \
            -o tests/openapi/openapi.yaml
          echo "AKEYLESS_OPENAPI_YAML=$(pwd)/tests/openapi/openapi.yaml" >> "$GITHUB_ENV"

      - name: Run sanity smoke test
        run: python3 tests/sanity/smoke.py

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run OpenAPI coverage matrix
        run: pytest tests/openapi/ -v

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${v}"

      - name: Build collection tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/release.sh build

      - name: Publish to Ansible Galaxy
        # Only runs when the API key secret has been provisioned. Until the
        # user configures it, this step short-circuits and the tarball is
        # still attached to the GitHub Release. GitHub Actions doesn't allow
        # referencing `secrets.*` in an `if:` directly, so we materialize the
        # secret into an env var on a preceding step and gate on its presence.
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
        run: |
          if [ -z "${ANSIBLE_GALAXY_API_KEY}" ]; then
            echo "[release] ANSIBLE_GALAXY_API_KEY not set -- skipping Galaxy publish."
            echo "[release] To enable, add the secret in repo Settings > Secrets and variables > Actions."
            exit 0
          fi
          ./scripts/release.sh publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./akeyless-akeyless-*.tar.gz
            ./akeyless-akeyless-*.tar.gz.sha256
