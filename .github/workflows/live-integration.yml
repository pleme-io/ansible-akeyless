# Live integration test — runs examples/live/*.yml against a real
# Akeyless gateway using AKEYLESS_ACCESS_ID + AKEYLESS_ACCESS_KEY
# repo secrets.
#
# Triggers ONLY on push to main + manual dispatch. No pull_request
# trigger — that's load-bearing: GH withholds secrets from fork PRs,
# but accepting the trigger at all means an internal contributor's
# PR could read them. Keep it main-only.

name: live-integration

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible + akeyless SDK
        run: |
          pip install --upgrade pip
          pip install ansible 'akeyless>=5.0.22' pyyaml

      - name: Build + install the collection locally
        run: |
          set -euo pipefail
          ansible-galaxy collection build --force --output-path .build
          tarball=$(ls -1 .build/*.tar.gz | head -n1)
          ansible-galaxy collection install "$tarball" --force

      # Run every live-mode example against the real gateway. Each
      # must reach exit_json successfully — failures here are real
      # gaps between collection ↔ upstream Akeyless API surface.
      - name: Run examples/live/*.yml against real Akeyless
        env:
          AKEYLESS_ACCESS_ID:  ${{ secrets.AKEYLESS_ACCESS_ID }}
          AKEYLESS_ACCESS_KEY: ${{ secrets.AKEYLESS_ACCESS_KEY }}
          AKEYLESS_GATEWAY_URL: https://api.akeyless.io
        run: |
          set -euo pipefail
          shopt -s nullglob
          plays=(examples/live/*.yml examples/live/*.yaml)
          if [ ${#plays[@]} -eq 0 ]; then
            echo "no live example playbooks present"; exit 0
          fi
          failures=0
          for p in "${plays[@]}"; do
            echo "::group::ansible-playbook $p"
            if ansible-playbook "$p"; then
              echo "ok: $p"
            else
              failures=$((failures + 1))
              echo "::error file=$p::live ansible-playbook failed"
            fi
            echo "::endgroup::"
          done
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures live example(s) failed"
            exit 1
          fi
          echo "all ${#plays[@]} live example(s) passed"
