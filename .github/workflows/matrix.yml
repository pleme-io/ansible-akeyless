name: matrix

# Python x ansible-core compatibility matrix.
#
# Runs the existing test pyramid (structural smoke, unit, OpenAPI coverage)
# across every supported combination, plus the mock-server integration tests
# under tests/mock/. Lives alongside ci.yml (the Nix-based single-entry flow)
# so failures are isolated to the specific (python, ansible-core) pair.
#
# Exclude list rationale (Python <-> ansible-core support windows):
#   - ansible-core 2.14 supports Python 3.9-3.11; drop 3.12, 3.13
#   - ansible-core 2.15 supports Python 3.9-3.11; drop 3.12, 3.13
#   - ansible-core 2.16 supports Python 3.10-3.12; drop 3.13
#   - ansible-core 2.17 supports Python 3.10-3.12; drop 3.13
#   - ansible-core 2.18 supports Python 3.11-3.13; drop 3.10
# Source: docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html

on:
  push:
  pull_request:

jobs:
  matrix:
    name: py${{ matrix.python }} / ansible-core ${{ matrix.ansible }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
        ansible: ['2.14', '2.15', '2.16', '2.17', '2.18']
        exclude:
          - python: '3.12'
            ansible: '2.14'
          - python: '3.12'
            ansible: '2.15'
          - python: '3.13'
            ansible: '2.14'
          - python: '3.13'
            ansible: '2.15'
          - python: '3.13'
            ansible: '2.16'
          - python: '3.13'
            ansible: '2.17'
          - python: '3.10'
            ansible: '2.18'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }} + test deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            'ansible-core>=${{ matrix.ansible }},<${{ matrix.ansible }}.99' \
            'akeyless>=5.0.22' \
            pytest pyyaml jsonschema responses

      - name: Fetch upstream OpenAPI spec
        run: |
          mkdir -p tests/openapi
          curl -fsSL \
            https://raw.githubusercontent.com/akeylesslabs/akeyless-go/master/api/openapi.yaml \
            -o tests/openapi/openapi.yaml
          echo "AKEYLESS_OPENAPI_YAML=$(pwd)/tests/openapi/openapi.yaml" >> "$GITHUB_ENV"

      - name: Structural smoke
        run: python3 tests/sanity/smoke.py

      - name: Unit tests
        run: pytest tests/unit/ -q

      - name: OpenAPI coverage matrix
        run: pytest tests/openapi/ -q

      - name: Mock-server integration tests
        run: pytest tests/mock/ -q
