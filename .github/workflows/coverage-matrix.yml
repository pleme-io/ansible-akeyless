name: coverage-matrix

# Runs the full pytest pyramid across a matrix of Python versions
# AND captures coverage to make sure the test layer keeps up with
# helper / lookup / inventory / filter / test plugin growth.
#
# Leverages GitHub Actions free compute for public repos: every push
# fans out to 5 Python interpreters in parallel + writes a coverage
# summary the maintainer can scan in the run summary.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  matrix:
    name: pytest pyramid (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # one Python's failure shouldn't mask others
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Core test deps. Keep this list tight -- new deps need
          # justification in code review.
          pip install pytest pytest-xdist pytest-cov pyyaml hypothesis ansible-core

      - name: Run the full test pyramid with coverage
        env:
          # Tell pytest to fail if coverage drops below the floor.
          # Bump this number as coverage grows; never lower it.
          PYTEST_ADDOPTS: >-
            --cov=plugins
            --cov-report=term-missing
            --cov-report=xml
        run: |
          python -m pytest tests/unit/ tests/mock/ tests/sanity/ -q -n auto

      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          retention-days: 7

      - name: Coverage summary in the step output
        if: always()
        run: |
          # Pull the line-rate out of the XML for the run summary so
          # maintainers can see the trend per-Python at a glance.
          python -c "
          import xml.etree.ElementTree as ET
          try:
              t = ET.parse('coverage.xml')
              rate = float(t.getroot().attrib.get('line-rate', '0')) * 100
              print(f'### Coverage: {rate:.1f}% (py${{ matrix.python }})')
          except Exception as e:
              print(f'(coverage parse skipped: {e})')
          " >> "$GITHUB_STEP_SUMMARY"
