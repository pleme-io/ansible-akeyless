---
# Set up an AWS dynamic-secret producer + request a short-lived credential.
#
# Prereqs: an AWS target named `demo_aws_target` already exists with permissions
# to call sts:GetFederationToken (or iam:CreateUser if you prefer IAM-user style).

- name: Dynamic AWS secret end-to-end
  hosts: localhost
  gather_facts: false
  collections: [drzln0.akeyless]
  vars:
    producer_path: /demo/producers/aws_ephemeral
    target_name: demo_aws_target

  tasks:
    - name: Create the dynamic AWS secret producer
      drzln0.akeyless.dynamic_secret_aws:
        name: "{{ producer_path }}"
        target_name: "{{ target_name }}"
        aws_user_policies: ""
        aws_user_groups: ""
        secret_type: assume_role
        admin_rotation_interval_days: 30
        user_ttl: 900s
        state: present

    - name: Issue an ephemeral credential
      drzln0.akeyless.dynamic_secret_get_value:
        name: "{{ producer_path }}"
      register: cred

    - name: Show that we got a credential (sensitive fields will be ***-masked)
      ansible.builtin.debug:
        var: cred.result
