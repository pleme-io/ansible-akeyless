---
# Demonstrate the `secret` lookup plugin — the canonical Ansible pattern
# for retrieving secret values inline, without a separate task + register.
#
# Prereqs: AKEYLESS_ACCESS_ID + AKEYLESS_ACCESS_KEY in env, secrets already
# exist at the paths below.
#
# The lookup runs ONCE per `lookup(...)` call site — the auth flow happens
# inside the lookup, transparent to the caller.

- name: Lookup plugin demo
  hosts: localhost
  gather_facts: false
  collections: [drzln0.akeyless]

  tasks:
    - name: Fetch a single secret inline
      ansible.builtin.debug:
        msg: "DB password is {{ lookup('drzln0.akeyless.secret', '/demo/db/password') }}"

    - name: Fetch multiple secrets at once (one API call)
      ansible.builtin.set_fact:
        creds:
          user: "{{ lookup('drzln0.akeyless.secret', '/demo/db/user') }}"
          pw:   "{{ lookup('drzln0.akeyless.secret', '/demo/db/password') }}"

    - name: Use them in a templated config
      ansible.builtin.copy:
        dest: /tmp/app.conf
        mode: '0600'
        content: |
          # Auto-generated; do not edit.
          DB_USER={{ creds.user }}
          DB_PASS={{ creds.pw }}

    - name: Lookup with an already-issued token (skips auth round-trip)
      ansible.builtin.debug:
        msg: >-
          {{ lookup('drzln0.akeyless.secret',
                    '/demo/api_key',
                    token=lookup('env', 'AKEYLESS_TOKEN')) }}
      when: lookup('env', 'AKEYLESS_TOKEN') | length > 0
