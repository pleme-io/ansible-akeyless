---
# Wire a target to a rotated secret and trigger a manual rotation.
#
# Pattern: target = "where to rotate against"; rotated secret = "what to rotate".

- name: Rotated secret end-to-end
  hosts: localhost
  gather_facts: false
  collections: [akeyless.akeyless]
  vars:
    target_path: /demo/targets/demo_pg
    secret_path: /demo/rotated/demo_pg_pw
    pg_host: db.example.internal
    pg_user: rotator
    pg_pw: "{{ lookup('env', 'DEMO_PG_PW') }}"

  tasks:
    - name: Create the Postgres target
      akeyless.akeyless.target_db:
        name: "{{ target_path }}"
        db_type: postgres
        host: "{{ pg_host }}"
        port: "5432"
        user_name: "{{ pg_user }}"
        pwd: "{{ pg_pw }}"
        state: present

    - name: Define the rotated secret pointing at the target
      akeyless.akeyless.rotated_secret_postgresql:
        name: "{{ secret_path }}"
        target_name: "{{ target_path }}"
        rotator_type: target
        rotation_interval: 30
        rotation_hour: 0
        state: present

    - name: Trigger a manual rotation right now
      akeyless.akeyless.rotated_secret_sync:
        names: "{{ secret_path }}"
      register: rotation

    - name: Show the rotation result
      ansible.builtin.debug:
        var: rotation.result
