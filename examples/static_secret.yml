---
# Full CRUD lifecycle of a static secret.
#
# Prereqs: AKEYLESS_ACCESS_ID + AKEYLESS_ACCESS_KEY in env.
#
# What it does:
#   1. Create a static secret with an initial value
#   2. Read it back via the data-source module
#   3. Update its value
#   4. Delete it (cleanup)

- name: Static secret lifecycle
  hosts: localhost
  gather_facts: false
  collections: [akeyless.akeyless]
  vars:
    secret_path: /demo/static_secret_example

  tasks:
    - name: Create the secret
      akeyless.akeyless.static_secret:
        name: "{{ secret_path }}"
        value: initial-value
        description: "Demo static secret from the akeyless.akeyless examples"
        state: present
      register: created

    - name: Read it back
      akeyless.akeyless.secret_value_info:
        names: ["{{ secret_path }}"]
      register: read_back

    - name: Show the value
      ansible.builtin.debug:
        msg: "Created secret {{ secret_path }} with value: {{ read_back.result }}"

    - name: Update the value
      akeyless.akeyless.static_secret:
        name: "{{ secret_path }}"
        value: rotated-value
        state: present

    - name: Clean up
      akeyless.akeyless.static_secret:
        name: "{{ secret_path }}"
        state: absent
