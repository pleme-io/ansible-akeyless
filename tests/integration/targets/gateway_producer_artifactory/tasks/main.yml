---
# Integration test for gateway_producer_artifactory

- name: Test gateway_producer_artifactory module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_producer_artifactory
      gateway_producer_artifactory:
        state: present
        artifactory_token_audience: "test_value"
        artifactory_token_scope: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_producer_artifactory (idempotent)
      gateway_producer_artifactory:
        state: present
        artifactory_token_audience: "test_value"
        artifactory_token_scope: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete gateway_producer_artifactory
      gateway_producer_artifactory:
        state: absent
        artifactory_token_audience: "test_value"
        artifactory_token_scope: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
