---
# Integration test for gateway_log_forwarding_azure_analytics

- name: Test gateway_log_forwarding_azure_analytics module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_log_forwarding_azure_analytics
      gateway_log_forwarding_azure_analytics:
        state: present
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_log_forwarding_azure_analytics (idempotent)
      gateway_log_forwarding_azure_analytics:
        state: present
      register: idempotent_result

    - name: Delete gateway_log_forwarding_azure_analytics
      gateway_log_forwarding_azure_analytics:
        state: absent
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
