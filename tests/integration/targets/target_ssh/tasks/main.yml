---
# Integration test for target_ssh

- name: Test target_ssh module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_ssh
      target_ssh:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_ssh (idempotent)
      target_ssh:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_ssh
      target_ssh:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
