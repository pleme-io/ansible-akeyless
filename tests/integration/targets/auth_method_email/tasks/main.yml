---
# Integration test for auth_method_email

- name: Test auth_method_email module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create auth_method_email
      drzln0.akeyless.auth_method_email:
        state: present
        email: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create auth_method_email (idempotent)
      drzln0.akeyless.auth_method_email:
        state: present
        email: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete auth_method_email
      drzln0.akeyless.auth_method_email:
        state: absent
        email: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
