---
# Integration test for gateway_allowed_access

- name: Test gateway_allowed_access module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_allowed_access
      gateway_allowed_access:
        state: present
        access_id: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_allowed_access (idempotent)
      gateway_allowed_access:
        state: present
        access_id: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete gateway_allowed_access
      gateway_allowed_access:
        state: absent
        access_id: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
