---
# Integration test for gateway_log_forwarding_aws_s3

- name: Test gateway_log_forwarding_aws_s3 module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_log_forwarding_aws_s3
      drzln0.akeyless.gateway_log_forwarding_aws_s3:
        state: present
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_log_forwarding_aws_s3 (idempotent)
      drzln0.akeyless.gateway_log_forwarding_aws_s3:
        state: present
      register: idempotent_result

    - name: Delete gateway_log_forwarding_aws_s3
      drzln0.akeyless.gateway_log_forwarding_aws_s3:
        state: absent
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
