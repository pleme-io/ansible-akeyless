---
# Integration test for target_azure

- name: Test target_azure module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_azure
      target_azure:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_azure (idempotent)
      target_azure:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_azure
      target_azure:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
