---
# Integration test for target_gemini

- name: Test target_gemini module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_gemini
      target_gemini:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_gemini (idempotent)
      target_gemini:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_gemini
      target_gemini:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
