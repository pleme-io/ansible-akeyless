---
# Integration test for target_ping

- name: Test target_ping module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_ping
      target_ping:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_ping (idempotent)
      target_ping:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_ping
      target_ping:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
