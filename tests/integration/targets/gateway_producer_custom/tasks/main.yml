---
# Integration test for gateway_producer_custom

- name: Test gateway_producer_custom module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_producer_custom
      drzln0.akeyless.gateway_producer_custom:
        state: present
        create_sync_url: "test_value"
        name: "test_value"
        revoke_sync_url: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_producer_custom (idempotent)
      drzln0.akeyless.gateway_producer_custom:
        state: present
        create_sync_url: "test_value"
        name: "test_value"
        revoke_sync_url: "test_value"
      register: idempotent_result

    - name: Delete gateway_producer_custom
      drzln0.akeyless.gateway_producer_custom:
        state: absent
        create_sync_url: "test_value"
        name: "test_value"
        revoke_sync_url: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
