---
# Integration test for target_linked

- name: Test target_linked module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_linked
      target_linked:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_linked (idempotent)
      target_linked:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_linked
      target_linked:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
