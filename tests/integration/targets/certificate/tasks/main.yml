---
# Integration test for certificate

- name: Test certificate module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create certificate
      drzln0.akeyless.certificate:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create certificate (idempotent)
      drzln0.akeyless.certificate:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete certificate
      drzln0.akeyless.certificate:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
