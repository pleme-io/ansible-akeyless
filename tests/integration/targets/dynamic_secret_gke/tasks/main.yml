---
# Integration test for dynamic_secret_gke

- name: Test dynamic_secret_gke module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create dynamic_secret_gke
      drzln0.akeyless.dynamic_secret_gke:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create dynamic_secret_gke (idempotent)
      drzln0.akeyless.dynamic_secret_gke:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete dynamic_secret_gke
      drzln0.akeyless.dynamic_secret_gke:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
