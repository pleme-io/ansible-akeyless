---
# Integration test for gateway_k8s_auth_config

- name: Test gateway_k8s_auth_config module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_k8s_auth_config
      gateway_k8s_auth_config:
        state: present
        access_id: "test_value"
        k8s_host: "test_value"
        name: "test_value"
        signing_key: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_k8s_auth_config (idempotent)
      gateway_k8s_auth_config:
        state: present
        access_id: "test_value"
        k8s_host: "test_value"
        name: "test_value"
        signing_key: "test_value"
      register: idempotent_result

    - name: Delete gateway_k8s_auth_config
      gateway_k8s_auth_config:
        state: absent
        access_id: "test_value"
        k8s_host: "test_value"
        name: "test_value"
        signing_key: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
