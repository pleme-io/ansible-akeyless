---
# Integration test for target_k8s

- name: Test target_k8s module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_k8s
      target_k8s:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_k8s (idempotent)
      target_k8s:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_k8s
      target_k8s:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
