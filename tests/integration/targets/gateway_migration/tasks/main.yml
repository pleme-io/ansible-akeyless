---
# Integration test for gateway_migration

- name: Test gateway_migration module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_migration
      gateway_migration:
        state: present
        hosts: "test_value"
        name: "test_value"
        si_target_name: "test_value"
        si_users_path_template: "test_value"
        target_location: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_migration (idempotent)
      gateway_migration:
        state: present
        hosts: "test_value"
        name: "test_value"
        si_target_name: "test_value"
        si_users_path_template: "test_value"
        target_location: "test_value"
      register: idempotent_result

    - name: Delete gateway_migration
      gateway_migration:
        state: absent
        hosts: "test_value"
        name: "test_value"
        si_target_name: "test_value"
        si_users_path_template: "test_value"
        target_location: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
