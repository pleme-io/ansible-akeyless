---
# Integration test for target_eks

- name: Test target_eks module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_eks
      drzln0.akeyless.target_eks:
        state: present
        eks_access_key_id: "test_value"
        eks_cluster_ca_cert: "test_value"
        eks_cluster_endpoint: "test_value"
        eks_cluster_name: "test_value"
        eks_secret_access_key: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_eks (idempotent)
      drzln0.akeyless.target_eks:
        state: present
        eks_access_key_id: "test_value"
        eks_cluster_ca_cert: "test_value"
        eks_cluster_endpoint: "test_value"
        eks_cluster_name: "test_value"
        eks_secret_access_key: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete target_eks
      drzln0.akeyless.target_eks:
        state: absent
        eks_access_key_id: "test_value"
        eks_cluster_ca_cert: "test_value"
        eks_cluster_endpoint: "test_value"
        eks_cluster_name: "test_value"
        eks_secret_access_key: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
