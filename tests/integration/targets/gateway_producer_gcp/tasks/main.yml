---
# Integration test for gateway_producer_gcp

- name: Test gateway_producer_gcp module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_producer_gcp
      gateway_producer_gcp:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_producer_gcp (idempotent)
      gateway_producer_gcp:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete gateway_producer_gcp
      gateway_producer_gcp:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
