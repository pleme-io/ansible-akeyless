---
# Integration test for policy

- name: Test policy module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create policy
      drzln0.akeyless.policy:
        state: present
        path: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create policy (idempotent)
      drzln0.akeyless.policy:
        state: present
        path: "test_value"
      register: idempotent_result

    - name: Delete policy
      drzln0.akeyless.policy:
        state: absent
        path: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
