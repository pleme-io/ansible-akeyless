---
# Integration test for gateway_log_forwarding_splunk

- name: Test gateway_log_forwarding_splunk module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_log_forwarding_splunk
      gateway_log_forwarding_splunk:
        state: present
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_log_forwarding_splunk (idempotent)
      gateway_log_forwarding_splunk:
        state: present
      register: idempotent_result

    - name: Delete gateway_log_forwarding_splunk
      gateway_log_forwarding_splunk:
        state: absent
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
