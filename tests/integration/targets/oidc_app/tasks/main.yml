---
# Integration test for oidc_app

- name: Test oidc_app module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create oidc_app
      drzln0.akeyless.oidc_app:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create oidc_app (idempotent)
      drzln0.akeyless.oidc_app:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete oidc_app
      drzln0.akeyless.oidc_app:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
