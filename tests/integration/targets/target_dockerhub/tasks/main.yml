---
# Integration test for target_dockerhub

- name: Test target_dockerhub module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_dockerhub
      drzln0.akeyless.target_dockerhub:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_dockerhub (idempotent)
      drzln0.akeyless.target_dockerhub:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_dockerhub
      drzln0.akeyless.target_dockerhub:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
