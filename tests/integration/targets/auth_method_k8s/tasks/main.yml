---
# Integration test for auth_method_k8s

- name: Test auth_method_k8s module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create auth_method_k8s
      auth_method_k8s:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create auth_method_k8s (idempotent)
      auth_method_k8s:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete auth_method_k8s
      auth_method_k8s:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
