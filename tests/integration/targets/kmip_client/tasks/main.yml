---
# Integration test for kmip_client

- name: Test kmip_client module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create kmip_client
      kmip_client:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create kmip_client (idempotent)
      kmip_client:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete kmip_client
      kmip_client:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
