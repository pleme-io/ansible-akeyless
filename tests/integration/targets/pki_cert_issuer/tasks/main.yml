---
# Integration test for pki_cert_issuer

- name: Test pki_cert_issuer module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create pki_cert_issuer
      drzln0.akeyless.pki_cert_issuer:
        state: present
        name: "test_value"
        ttl: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create pki_cert_issuer (idempotent)
      drzln0.akeyless.pki_cert_issuer:
        state: present
        name: "test_value"
        ttl: "test_value"
      register: idempotent_result

    - name: Delete pki_cert_issuer
      drzln0.akeyless.pki_cert_issuer:
        state: absent
        name: "test_value"
        ttl: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
