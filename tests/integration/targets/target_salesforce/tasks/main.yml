---
# Integration test for target_salesforce

- name: Test target_salesforce module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_salesforce
      drzln0.akeyless.target_salesforce:
        state: present
        auth_flow: "test_value"
        client_id: "test_value"
        email: "test_value"
        name: "test_value"
        tenant_url: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_salesforce (idempotent)
      drzln0.akeyless.target_salesforce:
        state: present
        auth_flow: "test_value"
        client_id: "test_value"
        email: "test_value"
        name: "test_value"
        tenant_url: "test_value"
      register: idempotent_result

    - name: Delete target_salesforce
      drzln0.akeyless.target_salesforce:
        state: absent
        auth_flow: "test_value"
        client_id: "test_value"
        email: "test_value"
        name: "test_value"
        tenant_url: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
