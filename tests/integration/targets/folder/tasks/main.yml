---
# Integration test for folder

- name: Test folder module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create folder
      folder:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create folder (idempotent)
      folder:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete folder
      folder:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
