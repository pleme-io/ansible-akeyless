---
# Integration test for target_gitlab

- name: Test target_gitlab module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_gitlab
      drzln0.akeyless.target_gitlab:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_gitlab (idempotent)
      drzln0.akeyless.target_gitlab:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_gitlab
      drzln0.akeyless.target_gitlab:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
