---
# Integration test for esm

- name: Test esm module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create esm
      esm:
        state: present
        esm_name: "test_value"
        secret_name: "test_value"
        value: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create esm (idempotent)
      esm:
        state: present
        esm_name: "test_value"
        secret_name: "test_value"
        value: "test_value"
      register: idempotent_result

    - name: Delete esm
      esm:
        state: absent
        esm_name: "test_value"
        secret_name: "test_value"
        value: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
