---
# Integration test for tokenizer

- name: Test tokenizer module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create tokenizer
      drzln0.akeyless.tokenizer:
        state: present
        name: "test_value"
        template_type: "test_value"
        tokenizer_type: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create tokenizer (idempotent)
      drzln0.akeyless.tokenizer:
        state: present
        name: "test_value"
        template_type: "test_value"
        tokenizer_type: "test_value"
      register: idempotent_result

    - name: Delete tokenizer
      drzln0.akeyless.tokenizer:
        state: absent
        name: "test_value"
        template_type: "test_value"
        tokenizer_type: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
