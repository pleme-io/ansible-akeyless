---
# Integration test for rotated_secret_cassandra

- name: Test rotated_secret_cassandra module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create rotated_secret_cassandra
      rotated_secret_cassandra:
        state: present
        name: "test_value"
        rotator_type: "test_value"
        target_name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create rotated_secret_cassandra (idempotent)
      rotated_secret_cassandra:
        state: present
        name: "test_value"
        rotator_type: "test_value"
        target_name: "test_value"
      register: idempotent_result

    - name: Delete rotated_secret_cassandra
      rotated_secret_cassandra:
        state: absent
        name: "test_value"
        rotator_type: "test_value"
        target_name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
