---
# Integration test for target_sectigo

- name: Test target_sectigo module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_sectigo
      target_sectigo:
        state: present
        certificate_profile_id: 1
        customer_uri: "test_value"
        external_requester: "test_value"
        name: "test_value"
        organization_id: 1
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_sectigo (idempotent)
      target_sectigo:
        state: present
        certificate_profile_id: 1
        customer_uri: "test_value"
        external_requester: "test_value"
        name: "test_value"
        organization_id: 1
      register: idempotent_result

    - name: Delete target_sectigo
      target_sectigo:
        state: absent
        certificate_profile_id: 1
        customer_uri: "test_value"
        external_requester: "test_value"
        name: "test_value"
        organization_id: 1
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
