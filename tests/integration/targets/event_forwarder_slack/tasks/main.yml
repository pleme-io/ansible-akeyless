---
# Integration test for event_forwarder_slack

- name: Test event_forwarder_slack module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create event_forwarder_slack
      drzln0.akeyless.event_forwarder_slack:
        state: present
        gateways_event_source_locations: "test_value"
        name: "test_value"
        runner_type: "test_value"
        url: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create event_forwarder_slack (idempotent)
      drzln0.akeyless.event_forwarder_slack:
        state: present
        gateways_event_source_locations: "test_value"
        name: "test_value"
        runner_type: "test_value"
        url: "test_value"
      register: idempotent_result

    - name: Delete event_forwarder_slack
      drzln0.akeyless.event_forwarder_slack:
        state: absent
        gateways_event_source_locations: "test_value"
        name: "test_value"
        runner_type: "test_value"
        url: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
