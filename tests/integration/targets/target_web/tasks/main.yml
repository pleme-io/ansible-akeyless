---
# Integration test for target_web

- name: Test target_web module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_web
      target_web:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_web (idempotent)
      target_web:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_web
      target_web:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
