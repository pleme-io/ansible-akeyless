---
# Integration test for auth_method_saml

- name: Test auth_method_saml module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create auth_method_saml
      drzln0.akeyless.auth_method_saml:
        state: present
        name: "test_value"
        unique_identifier: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create auth_method_saml (idempotent)
      drzln0.akeyless.auth_method_saml:
        state: present
        name: "test_value"
        unique_identifier: "test_value"
      register: idempotent_result

    - name: Delete auth_method_saml
      drzln0.akeyless.auth_method_saml:
        state: absent
        name: "test_value"
        unique_identifier: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
