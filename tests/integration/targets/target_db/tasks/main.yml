---
# Integration test for target_db

- name: Test target_db module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_db
      target_db:
        state: present
        connection_type: "test_value"
        db_type: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_db (idempotent)
      target_db:
        state: present
        connection_type: "test_value"
        db_type: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete target_db
      target_db:
        state: absent
        connection_type: "test_value"
        db_type: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
