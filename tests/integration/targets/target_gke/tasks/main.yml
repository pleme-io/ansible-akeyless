---
# Integration test for target_gke

- name: Test target_gke module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_gke
      target_gke:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_gke (idempotent)
      target_gke:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_gke
      target_gke:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
