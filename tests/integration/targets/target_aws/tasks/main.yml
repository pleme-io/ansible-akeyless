---
# Integration test for target_aws

- name: Test target_aws module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_aws
      drzln0.akeyless.target_aws:
        state: present
        access_key: "test_value"
        access_key_id: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_aws (idempotent)
      drzln0.akeyless.target_aws:
        state: present
        access_key: "test_value"
        access_key_id: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete target_aws
      drzln0.akeyless.target_aws:
        state: absent
        access_key: "test_value"
        access_key_id: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
