---
# Integration test for gateway_producer_hanadb

- name: Test gateway_producer_hanadb module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_producer_hanadb
      drzln0.akeyless.gateway_producer_hanadb:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_producer_hanadb (idempotent)
      drzln0.akeyless.gateway_producer_hanadb:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete gateway_producer_hanadb
      drzln0.akeyless.gateway_producer_hanadb:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
