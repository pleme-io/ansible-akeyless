---
# Integration test for role_auth_method_assoc

- name: Test role_auth_method_assoc module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create role_auth_method_assoc
      role_auth_method_assoc:
        state: present
        am_name: "test_value"
        role_name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create role_auth_method_assoc (idempotent)
      role_auth_method_assoc:
        state: present
        am_name: "test_value"
        role_name: "test_value"
      register: idempotent_result

    - name: Delete role_auth_method_assoc
      role_auth_method_assoc:
        state: absent
        am_name: "test_value"
        role_name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
