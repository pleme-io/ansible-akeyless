---
# Integration test for auth_method_gcp

- name: Test auth_method_gcp module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create auth_method_gcp
      auth_method_gcp:
        state: present
        audience: "test_value"
        name: "test_value"
        type: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create auth_method_gcp (idempotent)
      auth_method_gcp:
        state: present
        audience: "test_value"
        name: "test_value"
        type: "test_value"
      register: idempotent_result

    - name: Delete auth_method_gcp
      auth_method_gcp:
        state: absent
        audience: "test_value"
        name: "test_value"
        type: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
