---
# Integration test for account_custom_field

- name: Test account_custom_field module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create account_custom_field
      account_custom_field:
        state: present
        name: "test_value"
        object: "test_value"
        object_type: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create account_custom_field (idempotent)
      account_custom_field:
        state: present
        name: "test_value"
        object: "test_value"
        object_type: "test_value"
      register: idempotent_result

    - name: Delete account_custom_field
      account_custom_field:
        state: absent
        name: "test_value"
        object: "test_value"
        object_type: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
