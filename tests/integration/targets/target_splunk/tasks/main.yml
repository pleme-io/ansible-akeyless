---
# Integration test for target_splunk

- name: Test target_splunk module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_splunk
      target_splunk:
        state: present
        name: "test_value"
        url: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_splunk (idempotent)
      target_splunk:
        state: present
        name: "test_value"
        url: "test_value"
      register: idempotent_result

    - name: Delete target_splunk
      target_splunk:
        state: absent
        name: "test_value"
        url: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
