---
# Integration test for role

- name: Test role module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create role
      role:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create role (idempotent)
      role:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete role
      role:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
