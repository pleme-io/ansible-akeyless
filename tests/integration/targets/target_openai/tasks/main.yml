---
# Integration test for target_openai

- name: Test target_openai module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_openai
      drzln0.akeyless.target_openai:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_openai (idempotent)
      drzln0.akeyless.target_openai:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_openai
      drzln0.akeyless.target_openai:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
