---
# Integration test for target_ldap

- name: Test target_ldap module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_ldap
      drzln0.akeyless.target_ldap:
        state: present
        bind_dn: "test_value"
        bind_dn_password: "test_value"
        ldap_url: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_ldap (idempotent)
      drzln0.akeyless.target_ldap:
        state: present
        bind_dn: "test_value"
        bind_dn_password: "test_value"
        ldap_url: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete target_ldap
      drzln0.akeyless.target_ldap:
        state: absent
        bind_dn: "test_value"
        bind_dn_password: "test_value"
        ldap_url: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
