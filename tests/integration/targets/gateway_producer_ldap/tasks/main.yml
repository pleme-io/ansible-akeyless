---
# Integration test for gateway_producer_ldap

- name: Test gateway_producer_ldap module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create gateway_producer_ldap
      drzln0.akeyless.gateway_producer_ldap:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create gateway_producer_ldap (idempotent)
      drzln0.akeyless.gateway_producer_ldap:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete gateway_producer_ldap
      drzln0.akeyless.gateway_producer_ldap:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
