---
# Integration test for target_rabbitmq

- name: Test target_rabbitmq module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_rabbitmq
      drzln0.akeyless.target_rabbitmq:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_rabbitmq (idempotent)
      drzln0.akeyless.target_rabbitmq:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_rabbitmq
      drzln0.akeyless.target_rabbitmq:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
