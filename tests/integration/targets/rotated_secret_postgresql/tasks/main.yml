---
# Integration test for rotated_secret_postgresql

- name: Test rotated_secret_postgresql module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create rotated_secret_postgresql
      drzln0.akeyless.rotated_secret_postgresql:
        state: present
        name: "test_value"
        rotator_type: "test_value"
        target_name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create rotated_secret_postgresql (idempotent)
      drzln0.akeyless.rotated_secret_postgresql:
        state: present
        name: "test_value"
        rotator_type: "test_value"
        target_name: "test_value"
      register: idempotent_result

    - name: Delete rotated_secret_postgresql
      drzln0.akeyless.rotated_secret_postgresql:
        state: absent
        name: "test_value"
        rotator_type: "test_value"
        target_name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
