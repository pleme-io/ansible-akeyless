---
# Integration test for target_lets_encrypt

- name: Test target_lets_encrypt module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_lets_encrypt
      drzln0.akeyless.target_lets_encrypt:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_lets_encrypt (idempotent)
      drzln0.akeyless.target_lets_encrypt:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete target_lets_encrypt
      drzln0.akeyless.target_lets_encrypt:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
