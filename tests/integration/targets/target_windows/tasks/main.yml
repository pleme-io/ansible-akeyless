---
# Integration test for target_windows

- name: Test target_windows module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create target_windows
      target_windows:
        state: present
        hostname: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create target_windows (idempotent)
      target_windows:
        state: present
        hostname: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete target_windows
      target_windows:
        state: absent
        hostname: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
