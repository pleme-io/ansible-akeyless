---
# Integration test for ssh_cert_issuer

- name: Test ssh_cert_issuer module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create ssh_cert_issuer
      drzln0.akeyless.ssh_cert_issuer:
        state: present
        allowed_users: "test_value"
        name: "test_value"
        signer_key_name: "test_value"
        ttl: 1
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create ssh_cert_issuer (idempotent)
      drzln0.akeyless.ssh_cert_issuer:
        state: present
        allowed_users: "test_value"
        name: "test_value"
        signer_key_name: "test_value"
        ttl: 1
      register: idempotent_result

    - name: Delete ssh_cert_issuer
      drzln0.akeyless.ssh_cert_issuer:
        state: absent
        allowed_users: "test_value"
        name: "test_value"
        signer_key_name: "test_value"
        ttl: 1
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
