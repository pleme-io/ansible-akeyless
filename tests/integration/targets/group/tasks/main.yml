---
# Integration test for group

- name: Test group module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create group
      group:
        state: present
        group_alias: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create group (idempotent)
      group:
        state: present
        group_alias: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete group
      group:
        state: absent
        group_alias: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
