---
# Integration test for kmip_client_v2

- name: Test kmip_client_v2 module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create kmip_client_v2
      drzln0.akeyless.kmip_client_v2:
        state: present
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create kmip_client_v2 (idempotent)
      drzln0.akeyless.kmip_client_v2:
        state: present
        name: "test_value"
      register: idempotent_result

    - name: Delete kmip_client_v2
      drzln0.akeyless.kmip_client_v2:
        state: absent
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
