---
# Integration test for dynamic_secret_google_workspace

- name: Test dynamic_secret_google_workspace module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create dynamic_secret_google_workspace
      dynamic_secret_google_workspace:
        state: present
        access_mode: "test_value"
        admin_email: "test_value"
        name: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create dynamic_secret_google_workspace (idempotent)
      dynamic_secret_google_workspace:
        state: present
        access_mode: "test_value"
        admin_email: "test_value"
        name: "test_value"
      register: idempotent_result

    - name: Delete dynamic_secret_google_workspace
      dynamic_secret_google_workspace:
        state: absent
        access_mode: "test_value"
        admin_email: "test_value"
        name: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
