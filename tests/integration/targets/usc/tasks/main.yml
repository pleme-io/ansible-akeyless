---
# Integration test for usc

- name: Test usc module
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create usc
      usc:
        state: present
        secret_name: "test_value"
        usc_name: "test_value"
        value: "test_value"
      register: create_result

    - name: Verify creation
      ansible.builtin.assert:
        that:
          - create_result.changed

    - name: Create usc (idempotent)
      usc:
        state: present
        secret_name: "test_value"
        usc_name: "test_value"
        value: "test_value"
      register: idempotent_result

    - name: Delete usc
      usc:
        state: absent
        secret_name: "test_value"
        usc_name: "test_value"
        value: "test_value"
      register: delete_result

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - delete_result.changed
