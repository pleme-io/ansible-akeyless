---
# playbooks/fetch_secrets_into_env_file.yml
#
# End-to-end example: fetch a JSON-shaped Akeyless secret and render
# it as a /etc/app.env file on every target host, using the
# parse_dotenv_secret filter to roundtrip the dict through env format.
#
# Run:
#   ansible-playbook -i inventory.akeyless.yml \
#     drzln0.akeyless.fetch_secrets_into_env_file -e env=prod

- name: Render Akeyless secrets to a remote env file
  hosts: all
  gather_facts: false

  vars:
    env: prod
    secret_path: "/platform/{{ env }}/app/env"
    output_path: "/etc/app/{{ env }}.env"

  tasks:
    - name: Fetch and parse the env-shaped secret
      ansible.builtin.set_fact:
        app_env: >-
          {{ lookup('drzln0.akeyless.secret', secret_path)
             | drzln0.akeyless.parse_dotenv_secret }}
      no_log: true

    - name: Render env file with secure perms (0600 root:root)
      ansible.builtin.copy:
        dest: "{{ output_path }}"
        content: |
          # Auto-generated by drzln0.akeyless on {{ ansible_date_time.iso8601 }}
          # Source: Akeyless {{ secret_path }}
          {% for k, v in app_env.items() %}
          {{ k }}={{ v }}
          {% endfor %}
        owner: root
        group: root
        mode: '0600'
      become: true
      no_log: true
